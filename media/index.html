<!DOCTYPE html>
<html>
<head>
    <title>Page Redirection</title>
    <!-- Meta tag redirect -->
    <meta http-equiv="refresh" content="0; url=/">
    <!-- JavaScript fallback -->
    <script type="text/javascript">
        window.location.href = "/";
    </script>
</head>
<body>
    <p>If you are not redirected, <a href="/">click here</a>.</p>
</body>
</html>
